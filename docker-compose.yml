name: clinic-platform

services:
  mysql:
    image: mysql:8.4
    container_name: clinic-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: clinicdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - clinic-net

  flyway:
    image: flyway/flyway:10
    container_name: clinic-flyway
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./clinic-migration/src/main/resources/db/migration:/flyway/sql
    command: >
      -url=jdbc:mysql://mysql:3306/clinicdb
      -user=root
      -password=${MYSQL_ROOT_PASSWORD:-root123}
      -connectRetries=10
      migrate
    networks:
      - clinic-net

  wildfly:
    image: quay.io/wildfly/wildfly:35.0.1.Final-jdk21
    container_name: clinic-wildfly
    restart: unless-stopped
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    ports:
      - "8080:8080"
      - "9990:9990"
    entrypoint: ["/opt/jboss/wildfly/standalone/configuration/cli/wildfly-entrypoint.sh"]
    volumes:
      - ./clinic-app-ear/target/clinic-app.ear:/opt/jboss/wildfly/standalone/deployments/clinic-app.ear:ro
      - ./cli:/opt/jboss/wildfly/standalone/configuration/cli
      - wildfly_modules:/opt/jboss/wildfly/modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/clinic-api/api/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - clinic-net

  adminer:
    image: adminer:4
    container_name: clinic-adminer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"
    profiles:
      - tools
    networks:
      - clinic-net

volumes:
  mysql_data:
  wildfly_modules:

networks:
  clinic-net:
    driver: bridge
